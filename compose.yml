services:
  backup-job:
    image: s3torestic
    environment:
      # Restic Destination
      - RESTIC_REPOSITORY=s3:[https://s3.your-provider.com/my-repo](https://s3.your-provider.com/my-repo)
      - RESTIC_PASSWORD=your_secure_password
      - AWS_ACCESS_KEY_ID=DESTINATION_KEY
      - AWS_SECRET_ACCESS_KEY=DESTINATION_SECRET

      # Rclone Source
      - SRC_S3_BUCKET=production-data
      - SRC_S3_ENDPOINT=[https://s3.amazonaws.com](https://s3.amazonaws.com)
      - SRC_S3_ACCESS_KEY=SOURCE_KEY
      - SRC_S3_SECRET_ACCESS_KEY=SOURCE_SECRET

      # Retention
      - KEEP_LAST=10
    volumes:
      # Optional: persist restic cache for faster subsequent backups
      - ./restic-cache:/home/resticuser/.cache/restic
      # Important: Ensure this volume has enough space for the cloned bucket
      - ./temp-storage:/data
