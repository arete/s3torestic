<svg width="100%" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" fill="#0d1117"/>
  
  <!-- Glow -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#4B0082"/>
    </linearGradient>
  </defs>

  <!-- Ghost icon -->
  <text x="40" y="120" font-size="80">👻</text>

  <!-- Title -->
  <text x="140" y="110" font-size="48" fill="url(#grad)" font-family="Segoe UI, sans-serif" font-weight="700">
    S3Phantom
  </text>

  <!-- Subtitle -->
  <text x="140" y="150" font-size="16" fill="#8b949e" font-family="Segoe UI, sans-serif">
